    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="facebook-domain-verification" content="e1rrutwjrp7wcw6he3d5qqnafgxzj0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>DinPrev</title>
    <!-- Meta Pixel Code (só no site — no app nativo a origem é localhost e o
         pixel fica desligado, para não coletar rastreamento dentro do app) -->
    <script>
      if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1558862152481836');
        fbq('track', 'PageView');
      }
    </script>
    <!-- End Meta Pixel Code -->
    <script>
      // Aplica o tema antes do CSS pintar (evita flash). O tema escuro salvo só
      // vale dentro do dashboard (logado) — na landing fica sempre claro. Aqui
      // não dá pra saber a tela ainda, então o palpite é a sessão do Supabase
      // no localStorage (chave sb-*-auth-token); o App corrige depois se errar.
      (function () {
        try {
          var t = localStorage.getItem('theme') === 'dark' ? 'dark' : 'light';
          var logged = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && k.indexOf('sb-') === 0 && k.indexOf('-auth-token') > 0) {
              logged = true;
              break;
            }
          }
          document.documentElement.setAttribute('data-theme', logged ? t : 'light');
        } catch (e) {}
      })();
    </script>

    <!-- Meta Pixel Code (noscript) -->

      src="https://www.facebook.com/tr?id=1558862152481836&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code (noscript) -->
    <div id="root"></div>
